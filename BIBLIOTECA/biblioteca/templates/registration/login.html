{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card-custom" style="box-shadow: 0 10px 30px rgba(108, 99, 255, 0.2);">
            <div class="card-header text-center py-4" style="background: linear-gradient(135deg, rgba(108, 99, 255, 0.2), rgba(108, 99, 255, 0.05)); border-bottom: 1px solid rgba(108, 99, 255, 0.3);">
                <div style="font-size: 3rem; color: var(--accent-primary); margin-bottom: 0.5rem;">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h3 class="mb-0 text-white" style="font-weight: 700;">Iniciar Sesión</h3>
                <p class="text-secondary mt-2 mb-0" style="font-size: 0.9rem;">Por favor, ingresa tus credenciales</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary-custom w-100 mt-3" style="padding: 0.8rem; font-size: 1.1rem;">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Ingresar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
