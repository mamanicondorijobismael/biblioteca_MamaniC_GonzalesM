{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card-custom">
            <div class="card-header">
                <h4 class="mb-0 text-white"><i class="bi bi-book"></i> {% if object %}Editar{% else %}Crear{% endif %} Libro</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <div class="d-flex gap-2 mt-4 pt-3" style="border-top: 1px solid var(--border-color);">
                        <a href="{% url 'biblioteca:libro_list' %}" class="btn btn-secondary-custom">Cancelar</a>
                        <button type="submit" class="btn btn-success-custom ms-auto"><i class="bi bi-save me-1"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
