{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card-custom border-0" style="box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);">
            <div class="card-header text-center py-4" style="background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(233, 69, 96, 0.05)); border-bottom: 1px solid rgba(233, 69, 96, 0.3);">
                <div style="font-size: 3rem; color: var(--accent-secondary); margin-bottom: 0.5rem;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h3 class="mb-0 text-white" style="font-weight: 700;">Eliminar Autor</h3>
            </div>
            <div class="card-body text-center p-4 p-md-5">
                <p class="fs-5 mb-4 text-white">¿Estás seguro de que quieres eliminar al autor <br><strong style="color: var(--accent-primary);">"{{ object.nombre }} {{ object.apellido }}"</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'biblioteca:autor_list' %}" class="btn btn-secondary-custom">Cancelar</a>
                        <button type="submit" class="btn btn-danger-custom px-4"><i class="bi bi-trash"></i> Sí, eliminar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
